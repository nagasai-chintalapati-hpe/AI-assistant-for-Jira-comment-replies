services:
  app:
    build: .
    image: jira-comment-assistant:latest
    container_name: jira-assistant
    restart: unless-stopped          # auto-restart on crash, survives reboots
    ports:
      - "8000:8000"
    env_file:
      - .env                         # all secrets stay in .env, never in this file
    volumes:
      - app_data:/app/.data          # drafts DB + chroma + PDF uploads persist
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  app_data:
