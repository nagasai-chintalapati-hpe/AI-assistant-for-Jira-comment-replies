<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Jira Comment Assistant{% endblock %}</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ── HPE Navbar ── -->
  <nav class="navbar hpe-navbar d-flex justify-content-between align-items-center">
    <a class="navbar-brand" href="/ui">
      <img src="/static/images/hpe%20logo.jpg" alt="HPE" class="hpe-logo" />
      <span>Jira Comment Assistant</span>
    </a>
    <div class="d-flex align-items-center gap-3">
      <span class="nav-tagline d-none d-md-inline">Draft Review UI</span>
      <button id="themeToggle" class="theme-toggle-btn" title="Toggle light/dark theme" onclick="toggleTheme()">
        <span id="themeIcon"></span>
      </button>
    </div>
  </nav>

  <!-- ── Page content ── -->
  <div class="page-wrapper">
    <div class="container mt-4 mb-5">
      {% block content %}{% endblock %}
    </div>

    <!-- ── HPE Footer ── -->
    <footer class="hpe-footer">
      <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div class="d-flex align-items-center gap-2">
          <img src="/static/images/hpe%20logo.jpg" alt="HPE" class="footer-logo" />
          <span>&copy; 2026 Hewlett Packard Enterprise</span>
        </div>
        <div class="text-center">
          Built by
          <span class="footer-names">Nagasai Chintalapati</span>
          &amp;
          <span class="footer-names">Yousef Konswah</span>
          &nbsp;&middot;&nbsp; AI Assistant for Jira
        </div>
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <a href="https://github.com/nagasai-chintalapati-hpe/AI-assistant-for-Jira-comment-replies"
             target="_blank" rel="noopener noreferrer" class="footer-github-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16" style="vertical-align:-2px;margin-right:4px;">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>GitHub
          </a>
          &nbsp;&middot;&nbsp;
          <a href="/docs">API Docs</a>
          &nbsp;&middot;&nbsp;
          <a href="/health">Health</a>
        </div>
      </div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"></script>

  <script>
    const THEME_KEY = 'hpe-ui-theme';

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('themeIcon').textContent = theme === 'dark' ? '' : '';
      localStorage.setItem(THEME_KEY, theme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      applyTheme(current === 'dark' ? 'light' : 'dark');
    }

    (function () {
      const saved = localStorage.getItem(THEME_KEY) || 'dark';
      applyTheme(saved);
    })();
  </script>
</body>
</html>
